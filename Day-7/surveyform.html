<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Survey Form</title>
</head>
<body>

<h1 id="title">Survey Form</h1>
<p id="description">Thank you for helping us improve our platform</p>

<form id="survey-form">

  <label id="name-label" for="name">Name</label>
  <input id="name" type="text" placeholder="Enter your name" required>

  <br><br>

  <label id="email-label" for="email">Email</label>
  <input id="email" type="email" placeholder="Enter your email" required>

  <br><br>

  <label id="number-label" for="number">Age</label>
  <input id="number" type="number" min="10" max="100" placeholder="Enter your age">

  <br><br>

  <label for="dropdown">Current Role</label>
  <select id="dropdown">
    <option value="">Select role</option>
    <option value="student">Student</option>
    <option value="developer">Developer</option>
  </select>

  <br><br>

  <p>Would you recommend us?</p>
  <input type="radio" name="recommend" value="yes"> Yes
  <input type="radio" name="recommend" value="no"> No

  <br><br>

  <p>What would you like to improve?</p>
  <input type="checkbox" value="frontend"> Frontend
  <input type="checkbox" value="backend"> Backend
  <input type="checkbox" value="data"> Data Visualization

  <br><br>

  <textarea placeholder="Enter your comments"></textarea>

  <br><br>

  <button id="submit" type="submit">Submit</button>

</form>

</body>
</html>
